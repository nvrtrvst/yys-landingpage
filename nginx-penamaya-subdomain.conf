# ==========================================
# PENAMAYA SUBDOMAIN — penamaya.nuurulmuttaqiin.or.id
# ==========================================
server {
    server_name penamaya.nuurulmuttaqiin.or.id;

    access_log /var/log/nginx/penamaya_access.log;
    error_log /var/log/nginx/penamaya_error.log;

    client_max_body_size 20M;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Static assets (sama dgn main domain)
    location /uploads/ {
        alias /var/www/yys-landingpage/public/uploads/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /_next/static/ {
        alias /var/www/yys-landingpage/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Semua request diteruskan ke instance port 5001
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/penamaya.nuurulmuttaqiin.or.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/penamaya.nuurulmuttaqiin.or.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect HTTP ke HTTPS
server {
    if ($host = penamaya.nuurulmuttaqiin.or.id) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name penamaya.nuurulmuttaqiin.or.id;
    return 404;
}
